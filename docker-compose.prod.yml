# Production deploy: `docker compose -f docker-compose.prod.yml up -d`
# Serves the Infiltr API + console on :8000. Set a real INFILTR_SECRET_KEY.
services:
  infiltr:
    build: .
    image: infiltr:latest
    container_name: infiltr
    ports:
      - "8000:8000"
    environment:
      # Auth endpoints are always available; set to "1" to ENFORCE login/API-keys.
      # Left off by default so the bundled web console is usable out of the box.
      INFILTR_AUTH: "${INFILTR_AUTH:-0}"
      INFILTR_SCHEDULER: "1"
      INFILTR_SECRET_KEY: "${INFILTR_SECRET_KEY:-change-me-in-production}"
      INFILTR_MAX_CONCURRENT: "3"
      # Scope guard — restrict what can be scanned. Comma-separated hosts / globs / CIDRs.
      INFILTR_ALLOWLIST: "${INFILTR_ALLOWLIST:-}"
      INFILTR_BLOCKLIST: "${INFILTR_BLOCKLIST:-}"
      DATABASE_URL: "sqlite:////data/infiltr.db"
    volumes:
      - infiltr-data:/data
      - ./lab:/app/lab:ro
      # live code (the image also bakes it in; the mount lets you edit without a rebuild)
      - ./infiltr:/app/infiltr:ro
      - ./runner.py:/app/runner.py:ro
    # raw sockets for masscan / full nmap (the scanner is the appliance's purpose)
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: unless-stopped
    networks: [infiltr]

  # Optional in-network lab targets (remove for real deployments)
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: infiltr-dvwa
    restart: unless-stopped
    networks: [infiltr]

  # Weak Basic-Auth target with known test accounts, for the hydra module
  # (redteam:letmein123, analyst:winter2024)
  victim:
    image: nginx:alpine
    container_name: infiltr-victim
    restart: unless-stopped
    volumes:
      - ./lab/victim/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./lab/victim/htpasswd:/etc/nginx/.htpasswd:ro
    networks: [infiltr]

volumes:
  infiltr-data:

networks:
  infiltr:
    driver: bridge
