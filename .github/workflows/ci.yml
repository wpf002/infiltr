name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy fastapi "uvicorn[standard]" httpx passlib pytest ruff
      - name: Lint (ruff)
        run: ruff check infiltr runner.py || true
      - name: Compile check
        run: python -m compileall infiltr runner.py
      - name: Unit tests
        run: pytest -q

  integration:
    name: Integration against DVWA
    runs-on: ubuntu-latest
    services:
      dvwa:
        image: vulnerables/web-dvwa:latest
        ports:
          - 8080:80
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + a scan tool
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy fastapi "uvicorn[standard]" httpx passlib pytest
          sudo apt-get update && sudo apt-get install -y nmap
      - name: Wait for DVWA
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null && break || sleep 2
          done
      - name: Run integration tests
        env:
          INFILTR_TEST_TARGET: http://localhost:8080
        run: pytest -q tests/test_integration.py
