# Deliberately-weak HTTP Basic Auth target for exercising the hydra module.
# Test accounts (fake, known): redteam:letmein123  analyst:winter2024
server {
    listen 80 default_server;
    server_name victim;

    # Serve real content so auth_basic (access phase) is actually enforced —
    # a `return` here would fire in the earlier rewrite phase and bypass auth.
    location / {
        auth_basic           "Infiltr Test Realm";
        auth_basic_user_file /etc/nginx/.htpasswd;
        root /usr/share/nginx/html;
        index index.html;
    }

    location = /healthz {
        auth_basic off;
        return 200 "ok\n";
        default_type text/plain;
    }
}
